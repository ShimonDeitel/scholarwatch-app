name: Scholarwatch
options:
  bundleIdPrefix: com.shimondeitel.scholarwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Scholarwatch:
    type: application
    platform: iOS
    sources:
      - path: Scholarwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scholarwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Scholarwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ScholarwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScholarwatchTests
      - path: Scholarwatch.storekit
    dependencies:
      - target: Scholarwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scholarwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ScholarwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ScholarwatchUITests
    dependencies:
      - target: Scholarwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scholarwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Scholarwatch:
    build:
      targets:
        Scholarwatch: all
        ScholarwatchTests: [test]
        ScholarwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Scholarwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Scholarwatch.storekit
      targets:
        - ScholarwatchTests
        - ScholarwatchUITests
    archive:
      config: Release
